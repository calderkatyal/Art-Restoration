# Corruption pipeline configuration.
#
# Each sample: a random subset of `num_simultaneous.[min, max]` types is
# selected using per-type weights. For each selected type, the mask is
# generated in either "local" (scattered irregular shapes) or "global"
# (uniform fill) mode, uniformly at random among the modes enabled for
# that type. Severity is drawn uniformly in [min_severity, max_severity].
#
# Severity is remapped internally: s=0.01 -> ~0.3 effective intensity
# (faint but visible); s=1.0 -> 1.0. See
# src/corruption/presets.py::_effective_severity.
#
# Local shape family (per-channel; hard-coded in presets.py):
#   craquelure / paint_loss / yellowing / fading / deposits
#       -> 'generic'  : random irregular elongated blob. Severity-INVARIANT
#                       in shape; severity only modulates the soft mask.
#   rip_tear   -> 'rip_tear'  : elongated curved band. Half-width scales
#                              with severity (thin at low sev, wide at
#                              high sev).
#   scratches  -> 'scratches' : narrow elongated band. Half-width scales
#                              with severity.

# Range of how many distinct types are active per image.
num_simultaneous:
  min: 1
  max: 3

# Training only: zero per-type mask channels with this probability (union channel kept).
# Overridden by `corruption.dropout_prob` in the training YAML when merged.
dropout_prob: 0.2

# Per-type mask generation parameters.
#   weight:            Relative probability of this type being selected.
#   local_enabled:     Allow local (scattered-shape) masks.
#   global_enabled:    Allow uniform global-fill masks.
#   min_severity:      Lower bound on per-pixel mask intensity (user-facing).
#                      Ignored for `base` (no severity attribute).
#   max_severity:      Upper bound on per-pixel mask intensity (user-facing).
#                      Ignored for `base`.
#   local_min_num:     Min # of local-mode instances per image (>=1).
#   local_max_num:     Max # of local-mode instances per image. Per-image
#                      count sampled uniformly in [local_min_num, local_max_num].
#   local_area_frac:   [min, max] — per-instance surface area as a
#                      fraction of the image area (H*W). Each instance's
#                      target area is sampled uniformly in this range.
types:
  craquelure:
    weight: 1.0
    local_enabled: true
    global_enabled: true
    min_severity: 0.01
    max_severity: 1.0
    local_min_num: 1
    local_max_num: 3
    local_area_frac: [0.02, 0.25]

  rip_tear:
    weight: 1.0
    local_enabled: true
    global_enabled: false
    min_severity: 0.01
    max_severity: 1.0
    local_min_num: 1
    local_max_num: 2
    local_area_frac: [0.003, 0.06]

  paint_loss:
    weight: 1.0
    local_enabled: true
    global_enabled: false
    min_severity: 0.01
    max_severity: 1.0
    local_min_num: 2
    local_max_num: 5
    local_area_frac: [0.003, 0.03]

  yellowing:
    weight: 1.0
    local_enabled: true
    global_enabled: true
    min_severity: 0.01
    max_severity: 1.0
    local_min_num: 1
    local_max_num: 3
    local_area_frac: [0.03, 0.30]

  fading:
    weight: 1.0
    local_enabled: true
    global_enabled: true
    min_severity: 0.01
    max_severity: 1.0
    local_min_num: 1
    local_max_num: 3
    local_area_frac: [0.03, 0.30]

  deposits:
    weight: 1.0
    local_enabled: true
    global_enabled: true
    min_severity: 0.01
    max_severity: 1.0
    local_min_num: 1
    local_max_num: 3
    local_area_frac: [0.02, 0.20]

  scratches:
    weight: 1.0
    local_enabled: true
    global_enabled: false
    min_severity: 0.01
    max_severity: 1.0
    local_min_num: 2
    local_max_num: 5
    local_area_frac: [0.003, 0.05]
