# Master training config.
#
# Loaded via OmegaConf. CLI dot-notation overrides supported, e.g.
#     python -m src.train train.warmup_iterations=1000 ds_config.train_micro_batch_size_per_gpu=8
#
# Separate corruption config at `corruption.config_path` is merged in.

model:
  flux_model_name: "flux.2-klein-base-4b"
  spatial_compression: 16      # 8x encoder downsample * 2x patchify
  in_channels: 264             # 128 (z_t) + 128 (z_y) + 8 (mask: 7 types + union)
  hidden_size: 3072
  null_emb_path: "/nfs/roberts/home/ckk25/project_pi_jl2994/ckk25/null_emb.pt"  

train:
  train_dir: "/nfs/roberts/home/ckk25/project_pi_jl2994/ckk25/data/train" 
  val_dir: "/nfs/roberts/home/ckk25/project_pi_jl2994/ckk25/data/val" 
  checkpoint_root: "/nfs/roberts/home/ckk25/project_pi_jl2994/ckk25/checkpoints" 
  resolution: 512
  batch_size: 32
  gradient_checkpointing: true
  num_workers: 4
  sampler_seed: 42
  corruption_seed: 42
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
  snapshot_every_n_steps: 1
  num_epochs: 10
  seed: 42
  debug_vram: true
  warmup_iterations: 633
  save_every: 100
  val_every: 100
  log_every: 5
  inspect_data_every: 100
  inspect_data_root: "/nfs/roberts/home/ckk25/project_pi_jl2994/ckk25/inspect_data" 
  loss_weight_mask: 0.7
  resume_from: null

  optimizer:
    weight_decay: 0.01
    betas: [0.9, 0.999]

  scheduler:
    warmup_steps: 100
    min_lr: 1e-6

  warmup:
    lr: 1e-4

  full:
    backbone_lr: 1e-5
    img_in_lr: 1e-4

# Corruption pipeline — reference to a separate YAML loaded and merged
# into cfg.corruption at load time.
corruption:
  config_path: "src/corruption/configs/default.yaml"
  # Training only: with this probability, zero per-type mask channels 0..6 but keep
  # channel 7 (union of those masks) so the DiT still sees a coarse damage region.
  dropout_prob: 0.2

# Inference settings for periodic validation sampling during training.
inference:
  num_steps: 50

wandb:
  enabled: true
  project: "V1 Training"
  entity: "cpsc4520_final_project"
  run_name: "fixed_inference_4_21_4_22_unfixed_corruption_module"          
  tags: []                
  log_images: true
  log_images_every: 100
  log_images_num: 16

# DeepSpeed launcher config. Consumed by deepspeed.initialize(config=cfg.ds_config).
# Keeping optimizer/scheduler on the Python side (see train.optimizer/scheduler
# above); DeepSpeed handles ZeRO-2 partitioning, bf16, gradient clipping.
ds_config:
  train_micro_batch_size_per_gpu: 32
  gradient_accumulation_steps: 1
  gradient_clipping: 1.0
  steps_per_print: 100
  bf16:
    enabled: true
  zero_optimization:
    stage: 2
    overlap_comm: true
    contiguous_gradients: true
    reduce_bucket_size: 500000000
    allgather_bucket_size: 500000000

