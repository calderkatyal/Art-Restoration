model:
  flux_model_name: "flux.2-klein-base-4b"
  latent_channels: 128       # VAE z_channels=32 × 2×2 patchify
  spatial_compression: 16    # 8× encoder × 2× patchify
  mask_channels: 7           # 7 corruption types
  in_channels: 263           # 128 (z_t) + 128 (z_y) + 7 (mask)
  hidden_size: 3072
  context_in_dim: 7680       # 3 Qwen3-4B layers × 2560
  text_encoder_variant: "4B"
  null_emb_path: "null_text_emb.pt"

train:
  # stage: "warmup" trains only img_in (backbone frozen)
  #        "full"   trains all layers
  stage: "warmup"
  data_dir: "./data/wikiart"
  val_dir: "./data/wikiart_val"
  output_dir: "./checkpoints"
  resolution: 512
  batch_size: 4
  num_epochs: 50
  seed: 42
  save_every: 1000
  log_every: 100
  resume_from: null

  optimizer:
    name: "adamw"
    lr: 1e-4
    weight_decay: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: "cosine"
    warmup_steps: 500
    min_lr: 1e-6

  warmup:
    epochs: 5
    lr: 1e-4

  full:
    backbone_lr: 1e-5
    img_in_lr: 1e-4

  curriculum:
    enabled: true
    warmup_epochs: 5

# Corruption pipeline configuration
# All hyperparams here are tunable for curriculum learning
corruption:
  damage_types:
    - "cracks"
    - "paint_loss"
    - "yellowing"
    - "stains"
    - "fading"
    - "bloom"
    - "deposits"
  num_channels: 7

  # Probability of selecting individual (single-type) vs multi preset
  # For curriculum: start at 1.0 (individual only) then decrease to 0.4
  individual_prob: 0.4

  # Relative selection weights for individual presets
  # Set to 0.0 to disable a specific corruption type
  individual_weights:
    cracks: 1.0
    paint_loss: 1.0
    yellowing: 1.0
    stains: 1.0
    fading: 1.0
    bloom: 1.0
    deposits: 1.0

  # Relative selection weights for multi-degradation presets
  multi_weights:
    light_aging: 1.0
    heavy_craquelure: 1.0
    water_damage: 1.0
    sun_faded: 1.0
    smoke_damage: 1.0
    neglected_storage: 1.0
    heat_damage: 1.0
    flood_damage: 1.0
    museum_wear: 1.0
    salt_efflorescence: 1.0

  # Per-channel severity multiplier (applied after preset mask generation)
  # For curriculum: start low (e.g. 0.3) and anneal to 1.0
  severity_scale:
    cracks: 1.0
    paint_loss: 1.0
    yellowing: 1.0
    stains: 1.0
    fading: 1.0
    bloom: 1.0
    deposits: 1.0

# Inference settings used for periodic validation sampling during training
inference:
  num_steps: 50
  guidance: 4.0

wandb:
  enabled: true
  project: "art-restoration"
  entity: null        # set to your wandb username or team, or null to use default
  run_name: null      # null = auto-generated by wandb
  tags: []            # e.g. ["warmup", "klein-4b"]
  log_images: true    # log restored vs. corrupted vs. clean image grids to wandb
  log_images_every: 500  # log image grid every N steps
